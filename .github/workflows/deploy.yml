name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# NOTA: GitHub no permite que GITHUB_TOKEN cree el sitio Pages por primera vez.
# Requisito previo (una sola vez):
#   Settings → Pages → Source → "GitHub Actions"
# Tras eso, cada push a main despliega automáticamente.

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload static site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."   # sube index.html, style.css, script.js desde la raíz

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
