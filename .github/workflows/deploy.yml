name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Permisos válidos para GITHUB_TOKEN en workflow YAML.
# Nota: 'administration' NO es un permiso reconocido aquí — lo eliminamos.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Habilita GitHub Pages con source=GitHub Actions si aún no está activo.
      # La API devuelve 409 si ya existe — ignoramos ese error con || true.
      - name: Enable GitHub Pages via API (first-time setup)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/pages \
            --method POST \
            -H "Accept: application/vnd.github+json" \
            -f build_type=workflow \
            --silent 2>/dev/null || true

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
