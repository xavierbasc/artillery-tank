name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:          # permite lanzarlo manualmente desde la UI

# pages: write + id-token: write → deploy
# administration: write → configure-pages puede habilitar Pages automáticamente
permissions:
  contents: read
  pages: write
  id-token: write
  administration: write

# Evita deployments paralelos; el que llegue segundo cancela el primero
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # enablement: true → habilita Pages vía API si aún no lo está
      # (requiere administration: write en los permisos del token)
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Sube el contenido del repo raíz como artefacto de Pages.
      # Como el sitio es HTML/CSS/JS puro no hay paso de build.
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "."

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
